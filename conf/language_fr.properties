PrimaryColour1HelpText=Couleur Primaire 1 est la couleur de la bordure des onglets des Paramètres et des barres de défilement apparaissant à côté des listes, telles que celle de la Sélection de Shimejis.
PrimaryColour2HelpText=Couleur Primaire 2 est la couleur utilisée pour mettre l'accent sur les commandes de Shimeji, telles que lors d'un survole sur un bouton ou lorsqu'on survole la souris sur le menu après un clic droit.
SecondaryColour1HelpText=Couleur Secondaire 1 est la couleur de bordure des boutons et des glissières. Elle fait aussi partie de la bordure du panneau de fond des Paramètres.
SecondaryColour2HelpText=Couleur Secondaire 2 est la couleur principale des onglets désélectionnés des Paramètres et d'un petit élément décoratif sur les glissières. Elle fait aussi partie de la bordure du panneau de fond des Paramètres en plus d'être utilisée comme couleur pour indiquer les commandes désactivés, par exemple avec l'onglet du Mode Fenêtre, lorsque celui-ci n'est pas activé.
SecondaryColour3HelpText=Couleur Secondaire 3 est la couleur d'arrière-plan du menu principal.
BlackColourHelpText=Couleur du Texte est la couleur utilisée pour l'entièreté du texte du programme Shimeji.
WhiteColourHelpText=Couleur des Listes d'Arrière-plan est la couleur d'arrière-plan des fenêtres de texte et des listes dans les Paramètres, de la Sélection des Shimejis, ainsi que cet aperçu. Si vous pouvez lire ce texte, vous avez choisi une bonne couleur. :D

