PrimaryColour1HelpText=Primary Colour 1 is the border colour of the tabs in Settings and scroll bars that appear beside lists, such as in the Shimeji Chooser.
PrimaryColour2HelpText=Primary Colour 2 is the main accent colour used by controls throughout Shimeji, including button hovers and the right-click menu on a Shimeji.
SecondaryColour1HelpText=Secondary Colour 1 is the border colour of buttons, sliders and is part of the border colour of the main background panel of Settings.
SecondaryColour2HelpText=Secondary Colour 2 is the main colour of unselected tabs in Settings, a small decorative element on sliders and is part of the border colour of the main background panel of Settings. It also used as the colour for disabled controls, such as on the Window Mode tab when Windowed Mode is not enabled.
SecondaryColour3HelpText=Secondary Colour 3 is the main menu background colour.
BlackColourHelpText=Text Colour is used for all text throughout the Shimeji program.
WhiteColourHelpText=List Background Colour is the background colour for text boxes and lists in Settings, the Shimeji Chooser, and this preview. If you can read this text, you have selected a good colour.

