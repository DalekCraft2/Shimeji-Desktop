# Settings window - Theme
PrimaryColour1HelpText=اللون الأساسي الأول هو لون حدود علامات التبويب في الإعدادات وأشرطة التمرير التي تظهر بجوار القوائم، مثل تلك الموجودة في محدد الممثل.
PrimaryColour2HelpText=اللون الأساسي الثاني هو اللون الأساسي الرئيسي المستخدم بواسطة عناصر التحكم في جميع عناصر التحكم في الممثل، بما في ذلك تحريك الأزرار وقائمة النقر بزر الماوس الأيمن على الممثل
SecondaryColour1HelpText=اللون الثانوي الأول هو لون حدود الأزرار والشرائح وهو جزء من لون حدود لوحة الخلفية الرئيسية للإعدادات
SecondaryColour2HelpText="اللون الثانوي الثاني هو اللون الرئيسي لعلامات التبويب غير المحددة في الإعدادات، وهو عنصر زخرفي صغير على أشرطة التمرير، وهو جزء من لون حدود لوحة الخلفية الرئيسية للإعدادات. ويُستخدم أيضًا كلون لعناصر التحكم المعطلة، كما هو الحال في علامة تبويب "وضع النافذة" عند عدم تفعيل "وضع النافذة
SecondaryColour3HelpText="اللون الثانوي الثالث هو اللون الرئيسي لعلامات التبويب غير المحددة في الإعدادات، وهو عنصر زخرفي صغير على أشرطة التمرير، وهو جزء من لون حدود لوحة الخلفية الرئيسية للإعدادات. ويُستخدم أيضًا كلون لعناصر التحكم المعطلة، كما هو الحال في علامة تبويب "وضع النافذة" عند عدم تفعيل "وضع النافذة
BlackColourHelpText=يتم استخدام لون النص لجميع النصوص في برنامج الممثل
WhiteColourHelpText=لون خلفية القائمة هو لون خلفية مربعات النص والقوائم في الإعدادات، ومُختار المُمثل، وهذه المعاينة. إذا استطعت قراءة هذا النص، فقد اخترت لونًا جيدًا

